<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2048 - Pro Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --grid-bg: #bbada0;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
            --accent: #7b2cbf;
        }

        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Clear Sans', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* HEADER & SCORES */
        .header { display: flex; width: 340px; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-box { background: #333; padding: 5px 15px; border-radius: 5px; text-align: center; min-width: 60px; border: 1px solid var(--accent); }
        .score-label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .score-value { font-size: 20px; font-weight: bold; color: var(--accent); }

        /* GAME BOARD */
        #game-container { 
            background: var(--grid-bg); 
            width: 340px; 
            height: 340px; 
            padding: 15px; 
            border-radius: 6px; 
            position: relative; 
            user-select: none;
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 15px; }
        .cell { width: 70px; height: 70px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; }

        .tile { 
            width: 70px; height: 70px; position: absolute; display: flex; 
            align-items: center; justify-content: center; font-size: 30px; 
            font-weight: bold; border-radius: 3px; color: var(--text-dark);
            transition: top 100ms ease-in-out, left 100ms ease-in-out; 
            z-index: 10;
        }

        /* DEATH SCREEN */
        #death-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 6px; z-index: 100;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .death-title { font-size: 40px; color: #ff4d4d; margin-bottom: 10px; }
        .death-score { font-size: 20px; margin-bottom: 20px; }
        .retry-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 10px 25px; font-size: 18px; border-radius: 5px; 
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .retry-btn:hover { transform: scale(1.1); background: #9d4edd; }

        /* ANIMATIONS & COLORS */
        @keyframes appear { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }
        .tile-new { animation: appear 200ms ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .tile-merged { animation: pop 200ms ease-in-out; }

        .t2 { background: #eee4da; } .t4 { background: #ede0c8; }
        .t8 { background: #f2b179; color: var(--text-light); }
        .t16 { background: #f59563; color: var(--text-light); }
        .t32 { background: #f67c5f; color: var(--text-light); }
        .t64 { background: #f65e3b; color: var(--text-light); }
        .t128 { background: #edcf72; color: var(--text-light); font-size: 25px; }
        .t256 { background: #edcc61; color: var(--text-light); font-size: 25px; box-shadow: 0 0 15px rgba(237, 204, 97, 0.5); }
        .t512 { background: #edc850; color: var(--text-light); font-size: 25px; }
        .t1024 { background: #edc53f; color: var(--text-light); font-size: 18px; }
        .t2048 { background: #edc22e; color: var(--text-light); font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 36px; color: var(--accent);">2048</h1>
        <div style="display:flex; gap:10px;">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div id="score" class="score-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div id="best" class="score-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="death-screen">
            <div class="death-title">Game Over!</div>
            <div class="death-score">Final Score: <span id="final-score">0</span></div>
            <button class="retry-btn" onclick="resetGame()">Try Again</button>
        </div>
        <div class="grid">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
        <div id="tile-container"></div>
    </div>

<script>
    let board = Array(16).fill(0);
    let score = 0;
    let best = localStorage.getItem('2048-best') || 0;
    let lastAddedIndex = -1;
    let mergedIndices = [];

    document.getElementById('best').innerText = best;

    function init() {
        board = Array(16).fill(0);
        score = 0;
        document.getElementById('death-screen').style.display = 'none';
        addTile(); addTile();
        draw();
    }

    function addTile() {
        let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
        if (empty.length) {
            let index = empty[Math.floor(Math.random() * empty.length)];
            board[index] = Math.random() < 0.9 ? 2 : 4;
            lastAddedIndex = index;
        }
    }

    function draw() {
        const container = document.getElementById('tile-container');
        container.innerHTML = '';
        board.forEach((val, i) => {
            if (val > 0) {
                const tile = document.createElement('div');
                tile.className = `tile t${val}`;
                if (i === lastAddedIndex) tile.classList.add('tile-new');
                if (mergedIndices.includes(i)) tile.classList.add('tile-merged');
                tile.innerHTML = val;
                const row = Math.floor(i / 4);
                const col = i % 4;
                tile.style.top = (row * 85 + 15) + 'px';
                tile.style.left = (col * 85 + 15) + 'px';
                container.appendChild(tile);
            }
        });
        document.getElementById('score').innerText = score;
        if (score > best) {
            best = score;
            localStorage.setItem('2048-best', best);
            document.getElementById('best').innerText = best;
        }
        mergedIndices = [];
        lastAddedIndex = -1;
        checkGameOver();
    }

    function move(vx, vy) {
        let moved = false;
        for (let i = 0; i < 4; i++) {
            let line = [];
            for (let j = 0; j < 4; j++) {
                let idx = vy === 0 ? (i * 4 + (vx === 1 ? 3 - j : j)) : ((vy === 1 ? 3 - j : j) * 4 + i);
                if (board[idx] !== 0) line.push(board[idx]);
            }
            let mergedLine = [];
            for (let j = 0; j < line.length; j++) {
                if (j < line.length - 1 && line[j] === line[j + 1]) {
                    let newVal = line[j] * 2;
                    mergedLine.push(newVal);
                    score += newVal;
                    moved = true; j++;
                } else mergedLine.push(line[j]);
            }
            while (mergedLine.length < 4) mergedLine.push(0);
            for (let j = 0; j < 4; j++) {
                let idx = vy === 0 ? (i * 4 + (vx === 1 ? 3 - j : j)) : ((vy === 1 ? 3 - j : j) * 4 + i);
                if (board[idx] !== mergedLine[j]) moved = true;
                board[idx] = mergedLine[j];
            }
        }
        if (moved) draw();
        return moved;
    }

    function checkGameOver() {
        if (board.includes(0)) return;
        for (let i = 0; i < 16; i++) {
            let r = Math.floor(i / 4), c = i % 4;
            if (c < 3 && board[i] === board[i + 1]) return;
            if (r < 3 && board[i] === board[i + 4]) return;
        }
        document.getElementById('final-score').innerText = score;
        document.getElementById('death-screen').style.display = 'flex';
    }

    function resetGame() { init(); }

    window.addEventListener('keydown', e => {
        if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
            e.preventDefault();
            let moved = false;
            if (e.key === "ArrowUp") moved = move(0, -1);
            if (e.key === "ArrowDown") moved = move(0, 1);
            if (e.key === "ArrowLeft") moved = move(-1, 0);
            if (e.key === "ArrowRight") moved = move(1, 0);
            if (moved) setTimeout(() => { addTile(); draw(); }, 100);
        }
    });

    init();
</script>
</body>
</html>
