<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Minigames hub</title>
    <style>
        
        /* Dark Theme & Layout */
        body {
            background-color: #0f1014;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        nav {
            background-color: #1a1c23;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #313442;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #7b2cbf; /* Purple Gaming Accent */
            text-transform: uppercase;
        }

        /* The Grid Layout (Like CrazyGames) */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Game Cards */
        .game-card {
            background-color: #1a1c23;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border 0.2s;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .game-card:hover {
            transform: scale(1.05);
            border: 2px solid #7b2cbf;
        }

        .thumbnail {
            width: 100%;
            height: 150px;
            background-color: #313442;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }

        .game-info {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        h2 {
            border-left: 5px solid #7b2cbf;
            padding-left: 10px;
        }
    </style>
</head>
